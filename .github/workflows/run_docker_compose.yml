name: Run Docker compose

on:
  workflow_dispatch:
    inputs:
      version:
        description: Select a version
        type: choice
        options:
          - 1
          - 2
          - 3
      compose_file:
        description: select app to build
        type: choice
        options:
          - docker-compose.yml
          - docker-compose-second.yml
jobs:
  install_dependencies:
    runs-on: ubuntu-latest
    outputs:
      RUNNER: ${{ runner.name }}
    steps:
    - name: "Checkout main repo"
      uses: actions/checkout@v4

    - name: "Checkout second repo"
      uses: actions/checkout@v4
      with:
        repository: WelderWDE/docker_learn
        path: "docker_learn"
        ref: refs/heads/main
    - name: "Install docker-compose"
      run: sudo apt-get install docker-compose -y

    - name: "listdir"
      run: |
        sudo systemctl stop mono-xsp4.service 
        sudo systemctl disable mono-xsp4.service
        sudo kill $(ps aux | grep /usr/bin/mono | grep www-data | awk '{print $2}')
        ps aux | grep /usr/bin/mono
        sudo netstat -lpn

  compose_checker:
    runs-on: ${{needs.install_dependencies.outputs.RUNNER}}
    needs: install_dependencies
    steps:
    - name: "Check DC version"
      run: docker-compose --version
